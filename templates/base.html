<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Foydalanuvchi Tasnifi{% endblock %}</title>
    <meta name="description" content="Internet foydalanuvchilarini web-loglar asosida ML yordamida tasniflash tizimi.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- Theme init (before render to prevent flash) -->
    <script>
        (function(){
            var s=localStorage.getItem('theme');
            var p=window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', s||(p?'dark':'light'));
        })();
    </script>
</head>
<body>

    <!-- ── Navbar ──────────────────────────────────────── -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="fas fa-shield-alt"></i>
                NetUserClassify
            </a>

            <div class="d-flex align-items-center gap-2 d-lg-none">
                <button id="theme-toggle" onclick="toggleTheme()" aria-label="Mavzu">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="navbar-toggler border-0 p-1" type="button"
                    data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false" aria-label="Menyuni ochish">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>

            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-1">
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'home' %}active{% endif %}" href="/">
                            <i class="fas fa-home me-1 opacity-60"></i>Bosh Sahifa
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'upload' %}active{% endif %}" href="/upload">
                            <i class="fas fa-upload me-1 opacity-60"></i>Tahlil
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'results' %}active{% endif %}" href="/results">
                            <i class="fas fa-chart-pie me-1 opacity-60"></i>Natijalar
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'about' %}active{% endif %}" href="/about">
                            <i class="fas fa-info-circle me-1 opacity-60"></i>Loyiha Haqida
                        </a>
                    </li>
                    <li class="nav-item d-none d-lg-flex ms-2">
                        <button id="theme-toggle" onclick="toggleTheme()" aria-label="Mavzu">
                            <i class="fas fa-moon"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ── Main Content ─────────────────────────────────── -->
    <main class="container py-5 flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <!-- ── Footer ───────────────────────────────────────── -->
    <footer class="py-4 mt-auto" role="contentinfo">
        <div class="container text-center">
            <p class="mb-1 fw-semibold" style="color: var(--text-on-dark);">
                Internet Foydalanuvchilarini Tasniflash Tizimi
            </p>
            <small>
                Loyiha Muallifi:
                <span style="color: var(--accent); font-weight: 600;">Mehri Qurbonova</span>
                &copy; 2026
            </small>
        </div>
    </footer>

    <!-- ── Scripts ──────────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
